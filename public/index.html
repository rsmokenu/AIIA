<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIIA | AI Infra Arch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.4); --border: rgba(51, 65, 85, 0.5); --accent: #38bdf8; --text-main: #f1f5f9; --text-dim: #94a3b8; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #1e293b, #0f172a); color: var(--text-main); margin: 0; min-height: 100vh; line-height: 1.6; }
        .navbar { padding: 1rem 2rem; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; }
        .card { background: var(--card); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 1.25rem; padding: 2rem; position: relative; transition: all 0.4s; overflow: hidden; }
        .card:hover { border-color: var(--accent); transform: translateY(-6px); }
        .tag { display: inline-block; background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 0.3rem 0.8rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1.25rem; }
        .status-badge { display: flex; align-items: center; font-size: 0.8rem; font-weight: 600; color: var(--success); }
        .dot { height: 8px; width: 8px; background-color: var(--success); border-radius: 50%; margin-right: 0.6rem; box-shadow: 0 0 10px var(--success); }
        .action-btn { background: transparent; border: 1px solid var(--border); color: var(--accent); padding: 0.4rem 0.8rem; border-radius: 0.5rem; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
        .action-btn:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal { background: #0f172a; border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; width: 90%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }
        .close-modal { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }
        .modal-body textarea, .modal-body input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.75rem; color: var(--text-main); font-family: inherit; margin-bottom: 1rem; box-sizing: border-box; }

        #tactical-view { display: none; flex-direction: column; gap: 1.5rem; height: 700px; margin-bottom: 5rem; }
        .tactical-container { display: grid; grid-template-columns: 1fr 300px; gap: 1rem; flex: 1; min-height: 0; }
        .map-canvas-container { background: transparent; border: 1px solid var(--border); border-radius: 1rem; position: relative; overflow: hidden; }
        #collaboration-map { width: 100%; height: 100%; display: block; }
        .event-feed { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; display: flex; flex-direction: column; overflow: hidden; }
        .feed-header { padding: 0.75rem 1rem; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .feed-content { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; font-family: monospace; font-size: 0.75rem; }
        .feed-item { border-left: 2px solid var(--accent); padding-left: 0.75rem; border-color: #38bdf8; }
        .view-toggle { display: flex; background: rgba(255,255,255,0.05); padding: 0.25rem; border-radius: 0.75rem; border: 1px solid var(--border); }
        .toggle-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; font-weight: 700; }
        .toggle-btn.active { background: var(--accent); color: #000; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo"><i class="fas fa-microchip"></i> AIIA</a>
        <div style="display: flex; align-items: center; gap: 2rem;">
            <div id="brain-status" style="font-size:0.75rem; font-weight:800; padding:0.2rem 0.6rem; border-radius:4px; border:1px solid #64748b; color:#64748b;">BRAIN: LOADING...</div>
            <a href="#" onclick="openBroadcastModal()" style="color: #a855f7; text-decoration: none; font-size: 0.85rem; font-weight: 700;"><i class="fas fa-tower-broadcast"></i> BROADCAST</a>
            <div class="status-badge"><span class="dot"></span> BACKBONE ACTIVE</div>
        </div>
    </nav>

    <div class="container">
        <section style="text-align: center; margin-bottom: 5rem;">
            <h1 style="font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; background: linear-gradient(to right, #fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AI Infrastructure Architecture</h1>
            <p style="color: var(--text-dim);">Unified Neural Hub & Autonomous Backbone</p>
        </section>

        <section style="margin-bottom: 4rem;">
            <h2>Live Status</h2>
            <div class="card" style="padding: 1.5rem;">
                <div id="live-meta"></div>
                <div id="live-events" style="margin-top: 1rem; background: #000; border: 1px solid rgba(255,255,255,0.06); border-radius: 0.75rem; padding: 0.75rem; max-height: 150px; overflow: auto; font-family: monospace; font-size: 0.8rem; color: #93c5fd;"></div>
            </div>
        </section>

        <section style="margin-bottom: 4rem;">
            <h2>Registry & Capabilities</h2>
            <div id="registry-grid" class="grid"></div>
        </section>

        <section style="margin-bottom: 5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">Active Network Agents</h2>
                <div class="view-toggle">
                    <button class="toggle-btn active" id="btn-card-view" onclick="switchView('card')">Cards</button>
                    <button class="toggle-btn" id="btn-tactical-view" onclick="switchView('tactical')">Tactical</button>
                </div>
            </div>
            <div id="card-view" class="grid"></div>
            <div id="tactical-view">
                <div class="tactical-container">
                    <div class="map-canvas-container"><canvas id="collaboration-map"></canvas></div>
                    <div class="event-feed">
                        <div class="feed-header">Collaboration Stream</div>
                        <div class="feed-content" id="collab-feed"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header"><div class="modal-title" id="modal-title">Task</div><button class="close-modal" onclick="closeModal()">&times;</button></div>
            <div class="modal-body">
                <textarea id="modal-input" rows="4" placeholder="Enter task..."></textarea>
                <div style="display: flex; justify-content: flex-end; gap: 1rem;"><button class="action-btn" onclick="closeModal()">Cancel</button><button class="action-btn" style="background: var(--accent); color: #000;" onclick="submitTask()">Dispatch</button></div>
            </div>
        </div>
    </div>

    <div id="inspect-modal" class="modal-overlay">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header"><div class="modal-title" id="inspect-title">Inspection</div><button class="close-modal" onclick="closeInspectModal()">&times;</button></div>
            <div class="modal-body">
                <div style="background: rgba(0,0,0,0.3); border-radius: 0.5rem; overflow: hidden; border: 1px solid var(--border); margin-bottom: 1rem;">
                    <table style="width: 100%; font-size: 0.75rem; text-align: left;"><thead style="color: var(--text-dim);"><tr><th style="padding:0.75rem;">Type</th><th style="padding:0.75rem;">Command</th><th style="padding:0.75rem;">Status</th><th style="padding:0.75rem; text-align:right;">Manage</th></tr></thead><tbody id="inspect-task-body"></tbody></table>
                </div>
                <div style="display: flex; justify-content: flex-end;"><button class="action-btn" onclick="closeInspectModal()">Close</button></div>
            </div>
        </div>
    </div>

    <div id="broadcast-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header"><div class="modal-title">Global Broadcast</div><button class="close-modal" onclick="closeBroadcastModal()">&times;</button></div>
            <div class="modal-body">
                <textarea id="broadcast-input" rows="4" placeholder="Enter broadcast mission..."></textarea>
                <div style="display: flex; justify-content: flex-end; gap: 1rem;"><button class="action-btn" onclick="closeBroadcastModal()">Cancel</button><button class="action-btn" style="background: #a855f7; color: #fff; border:none;" onclick="submitBroadcast()">Fire</button></div>
            </div>
        </div>
    </div>

    <div id="rename-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header"><div class="modal-title">Rename Agent</div><button class="close-modal" onclick="closeRenameModal()">&times;</button></div>
            <div class="modal-body">
                <input type="text" id="rename-input">
                <div style="display: flex; justify-content: flex-end; gap: 1rem;"><button class="action-btn" onclick="closeRenameModal()">Cancel</button><button class="action-btn" style="background: var(--accent); color: #000;" onclick="submitRename()">Apply</button></div>
            </div>
        </div>
    </div>

    <script src="/tactical_map.js"></script>
    <script>
        let cB = null;
        async function refresh() {
            try {
                const res = await fetch('/api/v1/system/status'); const d = await res.json();
                document.getElementById('live-meta').innerHTML = '<b>Status:</b> ' + d.status + ' | <b>Agents:</b> ' + d.botCount + ' | <b>Uptime:</b> ' + d.uptimeSec + 's';
                document.getElementById('live-events').innerHTML = (d.recentEvents || []).map(e => {
                    try { const p = JSON.parse(e); return '<div>[' + new Date(p.timestamp).toLocaleTimeString() + '] ' + p.message + '</div>'; } catch(err) { return '<div>' + e + '</div>'; }
                }).join('');
                
                const sRes = await fetch('/api/v1/skills'); const sData = await sRes.json();
                document.getElementById('registry-grid').innerHTML = (sData.data || []).map(s => '<div class="card"><span class="tag">Skill</span><h3>'+s.toUpperCase()+'</h3></div>').join('');

                const bRes = await fetch('/api/v1/bots/registry'); const bData = await bRes.json();
                document.getElementById('card-view').innerHTML = (bData.data || []).map(bot => {
                    const btnLabel = bot.state === 'active' ? 'Pause' : 'Resume';
                    const nextAction = bot.state === 'active' ? 'stop' : 'resume';
                    return '<div class="card"><div style="display:flex; justify-content:space-between;"><h3>'+bot.name+'</h3><div style="display:flex; gap:0.5rem;"><button class="copy-btn" onclick="openRenameModal(\''+bot.id+'\',\''+bot.name+'\')"><i class="fas fa-edit"></i></button><span class="status-badge"><span class="dot" style="background-color:'+(bot.state==='active'?'#22c55e':'#f59e0b')+'"></span>'+bot.state.toUpperCase()+'</span></div></div><p style="font-family:monospace; font-size:0.75rem; color:var(--accent);">'+bot.id+'</p><div style="display:flex; gap:0.5rem;"><button class="action-btn" onclick="openTaskModal(\''+bot.id+'\',\''+bot.name+'\')">Task</button><button class="action-btn" onclick="openInspectModal(\''+bot.id+'\',\''+bot.name+'\')">Inspect</button><button class="action-btn" onclick="updateBotState(\''+bot.id+'\',\''+nextAction+'\')">'+btnLabel+'</button></div></div>';
                }).join('');

                const brRes = await fetch('/api/v1/bots/brain-status'); const brData = await brRes.json();
                const bEl = document.getElementById('brain-status');
                bEl.textContent = 'BRAIN: ' + brData.mode;
                bEl.style.color = brData.configured ? 'var(--success)' : '#ef4444';
                bEl.style.borderColor = brData.configured ? 'var(--success)' : '#ef4444';
            } catch (e) { console.error(e); }
        }

        function switchView(v) {
            const isT = v === 'tactical';
            document.getElementById('card-view').style.display = isT ? 'none' : 'grid';
            document.getElementById('tactical-view').style.display = isT ? 'flex' : 'none';
            document.getElementById('btn-card-view').classList.toggle('active', !isT);
            document.getElementById('btn-tactical-view').classList.toggle('active', isT);
            if (isT) { if(!window.tM) { window.tM = new TacticalMap('collaboration-map'); window.tM.start(); } window.tM.resize(); }
        }

        function openTaskModal(id,n){ cB=id; document.getElementById('modal-title').textContent='Task for '+n; document.getElementById('modal-overlay').classList.add('active'); }
        function closeModal(){ document.getElementById('modal-overlay').classList.remove('active'); }
        async function submitTask(){
            const content = document.getElementById('modal-input').value; if(!content) return;
            await fetch('/api/v1/bots/'+cB+'/tasks', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content}) });
            closeModal(); document.getElementById('modal-input').value='';
        }
        async function openInspectModal(id,n){
            cB=id; document.getElementById('inspect-title').textContent='Inspecting '+n; document.getElementById('inspect-modal').classList.add('active');
            const res = await fetch('/api/v1/bots/'+id+'/tasks/history');
            const {data} = await res.json();
            document.getElementById('inspect-task-body').innerHTML = (data || []).map(t=>'<tr><td>'+t.type+'</td><td>'+t.payload.content+'</td><td>'+t.status+'</td><td align="right"><button class="action-btn" onclick="runNow(\''+t.id+'\')">Run</button></td></tr>').join('');
        }
        function closeInspectModal(){ document.getElementById('inspect-modal').classList.remove('active'); }
        async function runNow(id){ await fetch('/api/v1/bots/'+cB+'/tasks/'+id+'/priority/up', {method:'POST'}); openInspectModal(cB, ''); }
        async function updateBotState(id,a){ await fetch('/api/v1/bots/'+id+'/'+a, {method:'POST'}); refresh(); }
        function openBroadcastModal(){ document.getElementById('broadcast-modal').classList.add('active'); }
        function closeBroadcastModal(){ document.getElementById('broadcast-modal').classList.remove('active'); }
        async function submitBroadcast(){
            const content = document.getElementById('broadcast-input').value; if(!content) return;
            const res = await fetch('/api/v1/bots/registry'); const d = await res.json();
            const sender = d.data[0]?.id; if(!sender) return alert('No agents');
            await fetch('/api/v1/bots/'+sender+'/broadcast', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content}) });
            closeBroadcastModal(); document.getElementById('broadcast-input').value='';
        }
        function openRenameModal(id,n){ cB=id; document.getElementById('rename-input').value=n; document.getElementById('rename-modal').classList.add('active'); }
        function closeRenameModal(){ document.getElementById('rename-modal').classList.remove('active'); }
        async function submitRename(){
            const newName = document.getElementById('rename-input').value; if(!newName) return;
            await fetch('/api/v1/bots/'+cB+'/rename', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({newName}) });
            closeRenameModal(); refresh();
        }

        window.onload = () => { refresh(); setInterval(refresh, 5000); };
    </script>
</body>
</html>
